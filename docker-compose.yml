version: '3.8'

services:
  db:
    image: postgres:13
    container_name: healthsync_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-healthsync}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - healthsync_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthsync_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-healthsync}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-here}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:80
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
      - /app/venv
    networks:
      - healthsync_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthsync_frontend
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8001
    ports:
      - "3000:80"
    networks:
      - healthsync_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: healthsync_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@healthsync.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - healthsync_network

volumes:
  postgres_data:

networks:
  healthsync_network:
    driver: bridge
